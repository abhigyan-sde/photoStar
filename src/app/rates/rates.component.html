<div class="rates-container">
    <h2>Photography Packages</h2>
    <div class="packages">
      <div class="package-card" *ngFor="let pkg of packages">
        <h3>{{ pkg.name }}</h3>
        <p class="price">{{ pkg.price }}</p>
        <p class="description">{{ pkg.description }}</p>
      </div>
    </div>
  </div>
