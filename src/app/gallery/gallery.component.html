<div class="gallery section">
  <div class="gallery-grid">
    <div class="gallery-item" *ngFor="let img of images; let i = index" (click)="openImage(i)">
      <img [src]="img" alt="Gallery image" />
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" *ngIf="selectedImage">
  <div class="modal-overlay" (click)="closeImage()"></div>

  <div class="modal-content">
    <span class="close" (click)="closeImage()">×</span>

    <img [src]="selectedImage" alt="Enlarged image" />

    <button class="nav left" (click)="prevImage()">&#10094;</button>
    <button class="nav right" (click)="nextImage()">&#10095;</button>
  </div>
</div>
